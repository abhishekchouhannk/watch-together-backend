<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Room — Watch Together</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ======== 0. Reset ======== */
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{height:100%}
    body{
      min-height:100%;
      font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      -webkit-font-smoothing:antialiased;overflow-x:hidden;
    }
    button{font-family:inherit;cursor:pointer;border:none;outline:none}
    input,textarea,select{font-family:inherit;outline:none}
    /* ======== 1. Theme Vars (same 4 themes) ======== */
    [data-theme="morning"]{
      --sky-fb:#b5b6ee;
      --glass:rgba(255,255,255,.48);--glass-border:rgba(255,255,255,.55);
      --card:rgba(255,255,255,.52);--card-h:rgba(255,255,255,.68);
      --card-bdr:rgba(190,130,160,.2);
      --card-sh:0 4px 16px rgba(136,19,55,.06);
      --hdr:rgba(255,255,255,.42);--hdr-bdr:rgba(190,130,160,.25);
      --t1:#4a0e2b;--t2:#6e1d42;--t3:#8c3a5e;
      --acc:#e11d48;--acc-h:#be185d;--acc-t:#fff;
      --acc-glow:rgba(225,29,72,.25);
      --surf:rgba(255,228,230,.65);--surf-h:rgba(254,205,211,.8);--surf-t:#881337;
      --in-bg:rgba(255,255,255,.6);--in-bdr:rgba(190,130,160,.3);
      --in-t:#4a0e2b;--in-ph:rgba(140,58,94,.5);
      --in-foc:#e11d48;--in-ring:rgba(225,29,72,.15);
      --tag-bg:rgba(251,207,232,.45);--tag-t:#9f1239;
      --scr-th:rgba(225,29,72,.25);--scr-tr:transparent;
      --toast-ok:rgba(5,150,105,.92);--toast-err:rgba(225,29,72,.92);--toast-t:#fff;
    }
    [data-theme="afternoon"]{
      --sky-fb:#229df2;
      --glass:rgba(255,255,255,.48);--glass-border:rgba(255,255,255,.5);
      --card:rgba(255,255,255,.55);--card-h:rgba(255,255,255,.72);
      --card-bdr:rgba(100,160,220,.2);
      --card-sh:0 4px 16px rgba(12,74,110,.06);
      --hdr:rgba(255,255,255,.4);--hdr-bdr:rgba(100,160,220,.25);
      --t1:#0c3d5e;--t2:#075985;--t3:#0c6aa7;
      --acc:#eab308;--acc-h:#ca8a04;--acc-t:#0c3d5e;
      --acc-glow:rgba(234,179,8,.25);
      --surf:rgba(255,255,255,.55);--surf-h:rgba(255,255,255,.75);--surf-t:#075985;
      --in-bg:rgba(255,255,255,.6);--in-bdr:rgba(100,160,220,.3);
      --in-t:#0c3d5e;--in-ph:rgba(12,106,167,.45);
      --in-foc:#eab308;--in-ring:rgba(234,179,8,.18);
      --tag-bg:rgba(186,230,253,.45);--tag-t:#075985;
      --scr-th:rgba(234,179,8,.3);--scr-tr:transparent;
      --toast-ok:rgba(5,150,105,.92);--toast-err:rgba(220,38,38,.92);--toast-t:#fff;
    }
    [data-theme="evening"]{
      --sky-fb:#8d6daa;
      --glass:rgba(35,15,55,.35);--glass-border:rgba(180,130,200,.18);
      --card:rgba(35,15,55,.38);--card-h:rgba(45,22,70,.5);
      --card-bdr:rgba(180,130,200,.15);
      --card-sh:0 4px 16px rgba(0,0,0,.12);
      --hdr:rgba(35,15,55,.35);--hdr-bdr:rgba(180,130,200,.15);
      --t1:#f3ecff;--t2:#d8c5f0;--t3:#b89dd4;
      --acc:#9333ea;--acc-h:#7e22ce;--acc-t:#fff;
      --acc-glow:rgba(147,51,234,.3);
      --surf:rgba(240,225,255,.12);--surf-h:rgba(240,225,255,.2);--surf-t:#d8c5f0;
      --in-bg:rgba(35,15,55,.42);--in-bdr:rgba(180,130,200,.25);
      --in-t:#f3ecff;--in-ph:rgba(184,157,212,.55);
      --in-foc:#9333ea;--in-ring:rgba(147,51,234,.2);
      --tag-bg:rgba(168,85,247,.16);--tag-t:#d8b4fe;
      --scr-th:rgba(147,51,234,.3);--scr-tr:transparent;
      --toast-ok:rgba(52,211,153,.92);--toast-err:rgba(248,113,113,.92);--toast-t:#fff;
    }
    [data-theme="night"]{
      --sky-fb:#171f43;
      --glass:rgba(25,35,72,.4);--glass-border:rgba(99,102,241,.15);
      --card:rgba(28,38,78,.45);--card-h:rgba(35,48,95,.58);
      --card-bdr:rgba(99,102,241,.12);
      --card-sh:0 4px 16px rgba(0,0,0,.18);
      --hdr:rgba(22,30,62,.5);--hdr-bdr:rgba(99,102,241,.15);
      --t1:#e0e7ff;--t2:#c0caee;--t3:#8b9ad4;
      --acc:#6366f1;--acc-h:#4f46e5;--acc-t:#fff;
      --acc-glow:rgba(99,102,241,.3);
      --surf:rgba(99,102,241,.12);--surf-h:rgba(99,102,241,.2);--surf-t:#c0caee;
      --in-bg:rgba(25,35,72,.48);--in-bdr:rgba(99,102,241,.2);
      --in-t:#e0e7ff;--in-ph:rgba(139,154,212,.5);
      --in-foc:#6366f1;--in-ring:rgba(99,102,241,.18);
      --tag-bg:rgba(99,102,241,.15);--tag-t:#a5b4fc;
      --scr-th:rgba(99,102,241,.25);--scr-tr:transparent;
      --toast-ok:rgba(52,211,153,.92);--toast-err:rgba(248,113,113,.92);--toast-t:#fff;
    }
    /* mode badges — light */
    [data-theme="morning"] .badge-study,[data-theme="afternoon"] .badge-study{background:rgba(37,99,235,.1);color:#1e40af}
    [data-theme="morning"] .badge-gaming,[data-theme="afternoon"] .badge-gaming{background:rgba(147,51,234,.1);color:#6b21a8}
    [data-theme="morning"] .badge-entertainment,[data-theme="afternoon"] .badge-entertainment{background:rgba(217,119,6,.1);color:#92400e}
    [data-theme="morning"] .badge-casual,[data-theme="afternoon"] .badge-casual{background:rgba(5,150,105,.1);color:#065f46}
    /* mode badges — dark */
    [data-theme="evening"] .badge-study,[data-theme="night"] .badge-study{background:rgba(96,165,250,.15);color:#93c5fd}
    [data-theme="evening"] .badge-gaming,[data-theme="night"] .badge-gaming{background:rgba(168,85,247,.14);color:#d8b4fe}
    [data-theme="evening"] .badge-entertainment,[data-theme="night"] .badge-entertainment{background:rgba(251,191,36,.13);color:#fcd34d}
    [data-theme="evening"] .badge-casual,[data-theme="night"] .badge-casual{background:rgba(52,211,153,.13);color:#6ee7b7}
    /* ======== 2. Sky / Base ======== */
    .sky-bg{position:fixed;inset:0;z-index:0;background-color:var(--sky-fb);background-size:cover;background-position:center;background-repeat:no-repeat}
    #roomPage{position:relative;min-height:100vh}
    /* ======== 3. Room Header ======== */
    .room-header{
      position:sticky;top:0;z-index:50;height:52px;
      background:var(--hdr);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border-bottom:1px solid var(--hdr-bdr);
      display:flex;align-items:center;justify-content:space-between;
      padding:0 1rem;gap:.75rem;
    }
    .back-btn{
      display:flex;align-items:center;gap:.35rem;
      background:transparent;color:var(--t2);font-size:.85rem;font-weight:600;
      padding:.35rem .6rem;border-radius:8px;transition:all .15s;white-space:nowrap;
    }
    .back-btn:hover{background:var(--surf);color:var(--t1)}
    .rh-center{
      flex:1;min-width:0;display:flex;align-items:center;gap:.5rem;
      justify-content:center;
    }
    .rh-name{
      font-size:.95rem;font-weight:700;color:var(--t1);
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    }
    .mode-badge{padding:.18rem .55rem;border-radius:6px;font-size:.7rem;font-weight:600;white-space:nowrap}
    .status-dot{width:.5rem;height:.5rem;border-radius:50%;display:inline-block;flex-shrink:0}
    .status-active{background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,.6)}
    .status-idle{background:#eab308}.status-ended{background:#94a3b8}
    .leave-btn{
      display:flex;align-items:center;gap:.3rem;
      padding:.38rem .75rem;border-radius:8px;font-size:.82rem;font-weight:600;
      background:transparent;color:#f87171;border:1px solid rgba(248,113,113,.3);
      transition:all .2s;white-space:nowrap;
    }
    .leave-btn:hover{background:rgba(248,113,113,.12);border-color:#f87171}
    /* ======== 4. Room Details ======== */
    .room-details{
      position:relative;z-index:1;
      background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      border:1px solid var(--card-bdr);border-radius:14px;
      padding:1rem 1.25rem;margin:1rem;
    }
    .rd-name{font-size:1.15rem;font-weight:700;color:var(--t1);margin-bottom:.3rem}
    .rd-desc{font-size:.88rem;color:var(--t3);line-height:1.5;margin-bottom:.6rem}
    .rd-meta{display:flex;align-items:center;flex-wrap:wrap;gap:.6rem;font-size:.82rem;color:var(--t2);margin-bottom:.5rem}
    .rd-meta-sep{color:var(--t3);opacity:.4}
    .rd-tags{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.55rem}
    .tag{padding:.12rem .5rem;border-radius:5px;font-size:.72rem;font-weight:500;background:var(--tag-bg);color:var(--tag-t)}
    .rd-avatars{display:flex;align-items:center}
    .avatar-sm{
      width:1.9rem;height:1.9rem;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:.7rem;font-weight:700;color:#fff;
      border:2px solid var(--card);flex-shrink:0;
    }
    .avatar-sm+.avatar-sm{margin-left:-.35rem}
    .avatar-more{background:var(--glass);color:var(--t2);font-size:.6rem;border-color:var(--glass-border)}
    /* skeleton inside details */
    .sk{border-radius:6px;background:linear-gradient(90deg,var(--card-bdr) 25%,var(--glass) 50%,var(--card-bdr) 75%);background-size:200% 100%;animation:shimmer 1.8s ease infinite}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    /* ======== 5. Room Content wrapper ======== */
    .room-content{position:relative;z-index:1;padding:0 1rem 1rem}
    /* ======== 6. Video Section ======== */
    .video-section{display:flex;flex-direction:column;gap:.6rem}
    .video-container{
      position:relative;width:100%;aspect-ratio:16/9;
      background:#000;border-radius:12px;overflow:hidden;
    }
    #videoWrapper{position:absolute;inset:0}
    #videoWrapper video,#videoWrapper iframe{width:100%;height:100%;display:block;border:0}
    .video-placeholder{
      position:absolute;inset:0;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      color:rgba(255,255,255,.65);gap:.25rem;user-select:none;
    }
    .vp-icon{font-size:3rem;opacity:.5}.vp-text{font-size:.95rem;font-weight:600}.vp-sub{font-size:.78rem;opacity:.55}
    /* video controls overlay */
    .vc{
      position:absolute;bottom:0;left:0;right:0;z-index:5;
      padding:.55rem .7rem;
      background:linear-gradient(transparent,rgba(0,0,0,.75));
      display:flex;align-items:center;gap:.55rem;
      opacity:0;transition:opacity .3s ease;
    }
    .video-container:hover .vc,.vc.show{opacity:1}
    .vc-btn{
      background:transparent;color:#fff;display:flex;align-items:center;justify-content:center;
      width:28px;height:28px;border-radius:6px;flex-shrink:0;transition:background .15s;
    }
    .vc-btn:hover{background:rgba(255,255,255,.15)}
    .vc-time{font-size:.72rem;color:rgba(255,255,255,.8);white-space:nowrap;min-width:3.2rem;text-align:center}
    /* styled range inputs inside controls */
    .vc-range{
      -webkit-appearance:none;appearance:none;
      height:4px;border-radius:2px;outline:none;cursor:pointer;
      background:rgba(255,255,255,.25);
    }
    .vc-range::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:#fff;cursor:pointer;box-shadow:0 0 4px rgba(0,0,0,.4)}
    .vc-range::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:#fff;cursor:pointer;border:none}
    .vc-progress{flex:1}
    .vc-volume{width:70px}
    /* URL bar */
    .url-bar{display:flex;gap:.5rem}
    .url-input{
      flex:1;padding:.55rem .8rem;
      background:var(--in-bg);border:1px solid var(--in-bdr);
      border-radius:10px;color:var(--in-t);font-size:.88rem;
      backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      transition:border-color .2s,box-shadow .2s;
    }
    .url-input:focus{border-color:var(--in-foc);box-shadow:0 0 0 3px var(--in-ring)}
    .url-input::placeholder{color:var(--in-ph)}
    .btn-sm{
      padding:.55rem 1rem;border-radius:10px;font-size:.85rem;font-weight:600;
      background:var(--acc);color:var(--acc-t);white-space:nowrap;
      transition:all .2s;
    }
    .btn-sm:hover{background:var(--acc-h)}
    /* ======== 7. Chat Section ======== */
    .chat-section{
      display:flex;flex-direction:column;
      background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      border:1px solid var(--card-bdr);border-radius:14px;overflow:hidden;
    }
    .chat-head{
      display:flex;align-items:center;justify-content:space-between;
      padding:.7rem 1rem;border-bottom:1px solid var(--card-bdr);flex-shrink:0;
    }
    .chat-title{font-size:.9rem;font-weight:700;color:var(--t1)}
    .chat-online{font-size:.78rem;color:var(--t3)}
    .chat-messages{flex:1;overflow-y:auto;padding:.75rem 1rem;min-height:0;display:flex;flex-direction:column;gap:.1rem}
    /* single message */
    .chat-msg{display:flex;gap:.5rem;padding:.3rem 0}
    .msg-av{
      width:1.75rem;height:1.75rem;border-radius:50%;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      font-size:.65rem;font-weight:700;color:#fff;margin-top:.1rem;
    }
    .msg-body{min-width:0}
    .msg-head{display:flex;align-items:baseline;gap:.4rem}
    .msg-name{font-size:.78rem;font-weight:700;color:var(--t1)}
    .msg-name.self{color:var(--acc)}
    .msg-ts{font-size:.65rem;color:var(--t3)}
    .msg-text{font-size:.88rem;color:var(--t2);line-height:1.45;word-break:break-word}
    .chat-sys{
      text-align:center;font-size:.75rem;color:var(--t3);
      font-style:italic;padding:.4rem 0;
    }
    /* input bar */
    .chat-bar{
      display:flex;gap:.5rem;padding:.65rem .75rem;
      border-top:1px solid var(--card-bdr);flex-shrink:0;
    }
    .chat-input{
      flex:1;padding:.55rem .8rem;
      background:var(--in-bg);border:1px solid var(--in-bdr);
      border-radius:10px;color:var(--in-t);font-size:.88rem;
      backdrop-filter:blur(8px);transition:border-color .2s,box-shadow .2s;
    }
    .chat-input:focus{border-color:var(--in-foc);box-shadow:0 0 0 3px var(--in-ring)}
    .chat-input::placeholder{color:var(--in-ph)}
    .send-btn{
      width:38px;height:38px;border-radius:10px;flex-shrink:0;
      background:var(--acc);color:var(--acc-t);
      display:flex;align-items:center;justify-content:center;transition:background .2s;
    }
    .send-btn:hover{background:var(--acc-h)}
    /* ======== 8. Toast ======== */
    .toast-wrap{position:fixed;bottom:1.5rem;right:1.5rem;z-index:200;display:flex;flex-direction:column;gap:.5rem;pointer-events:none}
    .toast{padding:.72rem 1.1rem;border-radius:10px;font-size:.87rem;font-weight:500;color:var(--toast-t);pointer-events:auto;animation:toastIn .3s ease;box-shadow:0 4px 16px rgba(0,0,0,.15)}
    .toast-success{background:var(--toast-ok)}.toast-error{background:var(--toast-err)}
    .toast.hiding{animation:toastOut .3s ease forwards}
    @keyframes toastIn{from{opacity:0;transform:translateY(10px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(10px) scale(.95)}}
    /* ======== 9. Scrollbar ======== */
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--scr-tr)}
    ::-webkit-scrollbar-thumb{background:var(--scr-th);border-radius:3px}
    *{scrollbar-width:thin;scrollbar-color:var(--scr-th) var(--scr-tr)}
    /* ======== 10. DESKTOP layout (≥769px) ======== */
    @media(min-width:769px){
      html,body{height:100%;overflow:hidden}
      #roomPage{height:100%;display:flex;flex-direction:column;overflow:hidden}
      .room-header{flex-shrink:0}
      .room-details{flex-shrink:0;max-height:180px;overflow-y:auto;margin:.75rem 1rem 0}
      .room-content{
        flex:1;display:flex;gap:.75rem;
        padding:.75rem 1rem 1rem;min-height:0;overflow:hidden;
      }
      .video-section{flex:1;min-width:0;min-height:0;overflow:hidden}
      .video-container{
        flex:1;min-height:0;aspect-ratio:auto;border-radius:12px;
      }
      .chat-section{width:340px;flex-shrink:0}
    }
    /* ======== 11. MOBILE layout (≤768px) ======== */
    @media(max-width:768px){
      html,body{height:auto;overflow-y:auto}
      .room-details{margin:.65rem .65rem 0;border-radius:12px}
      .room-content{
        display:flex;flex-direction:column;padding:0;
      }
      .video-section{
        position:sticky;top:52px;z-index:10;
        background:var(--sky-fb);
        padding:.65rem .65rem 0;
      }
      .video-section::after{
        content:'';position:absolute;bottom:-6px;left:0;right:0;height:6px;
        background:linear-gradient(rgba(0,0,0,.08),transparent);pointer-events:none;
      }
      .video-container{border-radius:10px}
      .chat-section{
        margin:.65rem;border-radius:12px;
        height:calc(100vh - 52px - 56.25vw - 80px);
        min-height:300px;
      }
      .rh-center{justify-content:flex-start}
      .vc-volume,.vc .vol-wrap{display:none}
    }
  </style>
</head>
<body>
<div id="roomPage" data-theme="morning">
  <div class="sky-bg" id="skyBg"></div>
  <!-- ===== HEADER ===== -->
  <header class="room-header">
    <button class="back-btn" id="backBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      <span class="back-label">Dashboard</span>
    </button>
    <div class="rh-center">
      <span class="rh-name" id="hdrName">Loading…</span>
      <span class="mode-badge badge-casual" id="hdrBadge" style="display:none"></span>
      <span class="status-dot status-active" id="hdrDot" style="display:none"></span>
    </div>
    <button class="leave-btn" id="leaveBtn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Leave
    </button>
  </header>
  <!-- ===== ROOM DETAILS ===== -->
  <section class="room-details" id="roomDetails">
    <div style="display:flex;flex-direction:column;gap:.55rem">
      <div class="sk" style="width:55%;height:1.15rem"></div>
      <div class="sk" style="width:90%;height:.85rem"></div>
      <div class="sk" style="width:40%;height:.85rem"></div>
    </div>
  </section>
  <!-- ===== MAIN CONTENT ===== -->
  <div class="room-content">
    <!-- VIDEO -->
    <div class="video-section">
      <div class="video-container" id="videoContainer">
        <div id="videoWrapper">
          <div class="video-placeholder" id="videoPlaceholder">
            <div class="vp-icon">📺</div>
            <p class="vp-text">No video loaded</p>
            <p class="vp-sub">Paste a URL below to start watching</p>
          </div>
        </div>
        <!-- custom controls (hidden until a direct video loads) -->
        <div class="vc" id="videoControls">
          <button class="vc-btn" id="playBtn" title="Play / Pause">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>
          </button>
          <span class="vc-time" id="curTime">0:00</span>
          <input type="range" class="vc-range vc-progress" id="progressBar" min="0" max="1000" value="0" step="1">
          <span class="vc-time" id="durTime">0:00</span>
          <div class="vol-wrap" style="display:flex;align-items:center;gap:.3rem">
            <button class="vc-btn" id="muteBtn" title="Mute">
              <svg id="volIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            </button>
            <input type="range" class="vc-range vc-volume" id="volBar" min="0" max="100" value="100" step="1">
          </div>
          <button class="vc-btn" id="fsBtn" title="Fullscreen">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
          </button>
        </div>
      </div>
      <div class="url-bar">
        <input type="text" class="url-input" id="urlInput" placeholder="Paste video URL (.mp4, YouTube, etc.)" autocomplete="off">
        <button class="btn-sm" id="loadUrlBtn">Load</button>
      </div>
    </div>
    <!-- CHAT -->
    <div class="chat-section" id="chatSection">
      <div class="chat-head">
        <span class="chat-title">💬 Chat</span>
        <span class="chat-online" id="chatOnline"></span>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-bar">
        <input type="text" class="chat-input" id="chatInput" placeholder="Type a message…" autocomplete="off" maxlength="500">
        <button class="send-btn" id="sendBtn" title="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
  <div class="toast-wrap" id="toastWrap"></div>
</div>
<!-- ===== SCRIPTS ===== -->
<script src="/js/helpers/timeOfDay.js"></script>
<script>
(function(){
  'use strict';
  /* ====== CONFIG ====== */
  const MODES = {
    study:         { label:'Study',         icon:'📚' },
    gaming:        { label:'Gaming',        icon:'🎮' },
    entertainment: { label:'Entertainment', icon:'🎬' },
    casual:        { label:'Casual',        icon:'☕' },
  };
  const AV_COLORS = ['#e11d48','#eab308','#22c55e','#3b82f6','#8b5cf6','#ec4899','#f97316','#06b6d4','#6366f1','#14b8a6'];
  /* ====== STATE ====== */
  const S = { room:null, userId:null, username:'You', messages:[] };
  const roomId = location.pathname.replace(/.*\/room\//,'').replace(/\/$/,'');
  /* ====== DOM ====== */
  const $ = id => document.getElementById(id);
  const dom = {
    root:$('roomPage'), sky:$('skyBg'),
    details:$('roomDetails'), hdrName:$('hdrName'), hdrBadge:$('hdrBadge'), hdrDot:$('hdrDot'),
    videoWrap:$('videoWrapper'), placeholder:$('videoPlaceholder'),
    controls:$('videoControls'), container:$('videoContainer'),
    chatMsgs:$('chatMessages'), chatInput:$('chatInput'), chatOnline:$('chatOnline'),
    toasts:$('toastWrap'),
  };
  /* ====== INIT ====== */
  document.addEventListener('DOMContentLoaded', async ()=>{
    const tod = resolveTod();
    dom.root.dataset.theme = tod;
    dom.sky.style.backgroundImage = "url('/assets/"+tod+"/sky.png')";
    wireEvents();
    await fetchMe();
    await joinRoom();
  });
  function resolveTod(){
    try{if(typeof getTimeOfDay==='function')return getTimeOfDay()}catch(_){}
    var h=new Date().getHours();
    if(h>=6&&h<12)return'morning';if(h>=12&&h<17)return'afternoon';
    if(h>=17&&h<21)return'evening';return'night';
  }
  /* ====== EVENTS ====== */
  function wireEvents(){
    $('backBtn').onclick = ()=> location.href='/dashboard';
    $('leaveBtn').onclick = leaveRoom;
    $('loadUrlBtn').onclick = ()=> loadVideo($('urlInput').value.trim());
    $('urlInput').addEventListener('keydown', e=>{ if(e.key==='Enter') loadVideo($('urlInput').value.trim()); });
    $('sendBtn').onclick = sendMessage;
    dom.chatInput.addEventListener('keydown', e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} });
    // touch: show controls briefly
    dom.container.addEventListener('touchstart',()=>{
      dom.controls.classList.add('show');
      clearTimeout(dom.controls._t);
      dom.controls._t=setTimeout(()=>dom.controls.classList.remove('show'),3000);
    });
  }
  /* ====== API ====== */
  async function fetchMe(){
    try{
      var r=await fetch('/api/auth/me',{credentials:'include'});
      if(!r.ok)return;
      var d=await r.json(), u=d.user||d;
      S.userId=u.id||u._id||null; S.username=u.username||'You';
    }catch(_){}
  }
  async function joinRoom(){
    try{
      var r=await fetch('/api/rooms/'+roomId+'/join',{method:'POST',credentials:'include'});
      if(r.status===401){location.href='/';return;}
      if(r.status===404){toast('Room not found','error');setTimeout(()=>location.href='/dashboard',1500);return;}
      if(!r.ok)throw new Error();
      var d=await r.json();
      S.room=d.room;
      renderRoom();
    }catch(e){
      toast('Failed to join room','error');
    }
  }
  async function leaveRoom(){
    try{await fetch('/api/rooms/'+roomId+'/leave',{method:'POST',credentials:'include'});}catch(_){}
    location.href='/dashboard';
  }
  /* ====== RENDER ROOM ====== */
  function renderRoom(){
    var r=S.room; if(!r)return;
    var cfg=MODES[r.mode]||{label:r.mode||'Room',icon:'📺'};
    var bc='badge-'+(MODES[r.mode]?r.mode:'casual');
    // header
    dom.hdrName.textContent=r.roomName;
    dom.hdrBadge.className='mode-badge '+bc; dom.hdrBadge.textContent=cfg.icon+' '+cfg.label; dom.hdrBadge.style.display='';
    dom.hdrDot.className='status-dot status-'+(r.status||'active'); dom.hdrDot.style.display='';
    // details
    var parts=r.participants||[];
    dom.details.innerHTML=
      '<h2 class="rd-name">'+esc(r.roomName)+'</h2>'
      +(r.description?'<p class="rd-desc">'+esc(r.description)+'</p>':'')
      +'<div class="rd-meta">'
        +'<span class="mode-badge '+bc+'">'+cfg.icon+' '+cfg.label+'</span>'
        +'<span style="display:flex;align-items:center;gap:.3rem"><span class="status-dot status-'+(r.status||'active')+'"></span>'+esc(r.status||'active')+'</span>'
        +'<span class="rd-meta-sep">·</span>'
        +'<span>Hosted by <strong>'+esc(r.admin?r.admin.username:'—')+'</strong></span>'
        +'<span class="rd-meta-sep">·</span>'
        +'<span>👥 '+parts.length+'/'+(r.maxParticipants||10)+'</span>'
      +'</div>'
      +(r.tags&&r.tags.length?'<div class="rd-tags">'+r.tags.map(t=>'<span class="tag">#'+esc(t)+'</span>').join('')+'</div>':'')
      +renderAvatars(parts);
    dom.chatOnline.textContent=parts.length+' in room';
    // system msg
    addSystemMsg('You joined the room');
    // auto-load video if room has one
    if(r.video&&r.video.url){
      $('urlInput').value=r.video.url;
      loadVideo(r.video.url);
    }
  }
  function renderAvatars(list){
    if(!list.length)return'';
    var MAX=10,show=list.slice(0,MAX),extra=list.length-MAX;
    var h='<div class="rd-avatars">';
    show.forEach(p=>{
      var c=avColor(p.username), ini=(p.username||'?')[0].toUpperCase();
      h+='<div class="avatar-sm" style="background:'+c+'" title="'+esc(p.username)+'">'+ini+'</div>';
    });
    if(extra>0) h+='<div class="avatar-sm avatar-more">+'+extra+'</div>';
    return h+'</div>';
  }
  /* ====== VIDEO PLAYER ====== */
  var videoEl=null, isYT=false;
  function loadVideo(url){
    if(!url){toast('Enter a URL','error');return;}
    var ytId=extractYT(url);
    isYT=!!ytId;
    if(ytId){
      dom.videoWrap.innerHTML='<iframe src="https://www.youtube.com/embed/'+ytId+'?autoplay=0&rel=0" allow="autoplay;encrypted-media;fullscreen" allowfullscreen></iframe>';
      dom.controls.style.display='none';
    }else{
      dom.videoWrap.innerHTML='<video id="videoEl" preload="metadata"></video>';
      videoEl=$('videoEl');
      videoEl.src=url;
      dom.controls.style.display='';
      wireVideoControls();
    }
    dom.placeholder.remove();
    $('urlInput').value=url;
    // ===== SOCKET.IO HOOK — broadcast loaded URL to room =====
    // socket.emit('video-load', { roomId, url });
  }
  function wireVideoControls(){
    if(!videoEl)return;
    var prog=$('progressBar'),cur=$('curTime'),dur=$('durTime');
    var playBtn=$('playBtn'),muteBtn=$('muteBtn'),volBar=$('volBar'),fsBtn=$('fsBtn');
    videoEl.addEventListener('loadedmetadata',()=>{
      dur.textContent=fmtTime(videoEl.duration);
      prog.max=Math.floor(videoEl.duration*100)||1000;
      fillSlider(volBar,100,100);
    });
    videoEl.addEventListener('timeupdate',()=>{
      cur.textContent=fmtTime(videoEl.currentTime);
      prog.value=Math.floor(videoEl.currentTime*100);
      fillSlider(prog,prog.value,prog.max);
    });
    videoEl.addEventListener('play',()=>{playBtn.innerHTML=pauseSVG});
    videoEl.addEventListener('pause',()=>{playBtn.innerHTML=playSVG});
    videoEl.addEventListener('ended',()=>{playBtn.innerHTML=playSVG});
    playBtn.onclick=togglePlay;
    videoEl.onclick=togglePlay;
    prog.addEventListener('input',()=>{
      videoEl.currentTime=prog.value/100;
      fillSlider(prog,prog.value,prog.max);
    });
    muteBtn.onclick=()=>{
      videoEl.muted=!videoEl.muted;
      muteBtn.innerHTML=videoEl.muted?mutedSVG:volSVG;
    };
    volBar.addEventListener('input',()=>{
      videoEl.volume=volBar.value/100;
      videoEl.muted=videoEl.volume===0;
      muteBtn.innerHTML=videoEl.muted?mutedSVG:volSVG;
      fillSlider(volBar,volBar.value,100);
    });
    fsBtn.onclick=()=>{
      if(document.fullscreenElement)document.exitFullscreen();
      else dom.container.requestFullscreen().catch(()=>{});
    };
    // ===== SOCKET.IO HOOKS — sync play/pause/seek =====
    // videoEl.addEventListener('play', ()=> socket.emit('video-play',{ roomId, currentTime:videoEl.currentTime }));
    // videoEl.addEventListener('pause',()=> socket.emit('video-pause',{ roomId, currentTime:videoEl.currentTime }));
    // videoEl.addEventListener('seeked',()=> socket.emit('video-seek',{ roomId, currentTime:videoEl.currentTime }));
  }
  function togglePlay(){
    if(!videoEl)return;
    if(videoEl.paused)videoEl.play().catch(()=>{});else videoEl.pause();
  }
  function extractYT(url){
    var m=url.match(/(?:youtube\.com\/(?:watch\?.*v=|embed\/|shorts\/)|youtu\.be\/)([\w-]{11})/);
    return m?m[1]:null;
  }
  /* SVG strings for player buttons */
  var playSVG='<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>';
  var pauseSVG='<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
  var volSVG='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>';
  var mutedSVG='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>';
  function fillSlider(el,val,max){
    var pct=(val/max)*100;
    el.style.background='linear-gradient(to right,#fff '+pct+'%,rgba(255,255,255,.25) '+pct+'%)';
  }
  /* ====== CHAT ====== */
  function sendMessage(){
    var text=dom.chatInput.value.trim();
    if(!text)return;
    addMessage({username:S.username,text:text,self:true});
    dom.chatInput.value='';
    dom.chatInput.focus();
    // ===== SOCKET.IO HOOK — send message to room =====
    // socket.emit('chat-message', { roomId, username: S.username, text });
  }
  function addMessage(msg){
    S.messages.push(msg);
    var c=avColor(msg.username), ini=(msg.username||'?')[0].toUpperCase();
    var div=document.createElement('div');
    div.className='chat-msg';
    div.innerHTML=
      '<div class="msg-av" style="background:'+c+'">'+ini+'</div>'
      +'<div class="msg-body">'
        +'<div class="msg-head">'
          +'<span class="msg-name'+(msg.self?' self':'')+'">'+esc(msg.username)+'</span>'
          +'<span class="msg-ts">'+chatTs()+'</span>'
        +'</div>'
        +'<div class="msg-text">'+esc(msg.text)+'</div>'
      +'</div>';
    dom.chatMsgs.appendChild(div);
    dom.chatMsgs.scrollTop=dom.chatMsgs.scrollHeight;
  }
  function addSystemMsg(text){
    var div=document.createElement('div');
    div.className='chat-sys';
    div.textContent=text;
    dom.chatMsgs.appendChild(div);
    dom.chatMsgs.scrollTop=dom.chatMsgs.scrollHeight;
  }
  // ===== SOCKET.IO HOOKS — receive messages =====
  // socket.on('chat-message', msg => addMessage(msg));
  // socket.on('user-joined', d => { addSystemMsg(d.username+' joined'); updateParticipants(d.participants); });
  // socket.on('user-left',   d => { addSystemMsg(d.username+' left');   updateParticipants(d.participants); });
  /* ====== HELPERS ====== */
  function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
  function fmtTime(s){if(isNaN(s))return'0:00';var m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec}
  function chatTs(){var d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')}
  function avColor(name){if(!name)return AV_COLORS[0];var h=0;for(var i=0;i<name.length;i++)h=name.charCodeAt(i)+((h<<5)-h);return AV_COLORS[Math.abs(h)%AV_COLORS.length]}
  function toast(msg,type){
    var el=document.createElement('div');el.className='toast toast-'+(type||'success');el.textContent=msg;
    dom.toasts.appendChild(el);
    setTimeout(()=>{el.classList.add('hiding');setTimeout(()=>el.remove(),300)},3200);
  }
})();
</script>
</body>
</html>
