<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Room — Watch Together</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/room.css" />
  </head>
  <body>
    <div id="roomPage" data-theme="morning">
      <div class="sky-bg" id="skyBg"></div>
      <!-- ===== HEADER ===== -->
      <header class="room-header">
        <button class="back-btn" id="backBtn">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="19" y1="12" x2="5" y2="12" />
            <polyline points="12 19 5 12 12 5" />
          </svg>
          <span class="back-label">Dashboard</span>
        </button>
        <div class="rh-center">
          <span class="rh-name" id="hdrName">Loading…</span>
          <span
            class="mode-badge badge-casual"
            id="hdrBadge"
            style="display: none"
          ></span>
          <span
            class="status-dot status-active"
            id="hdrDot"
            style="display: none"
          ></span>
        </div>
        <div class="rh-right">
          <div class="theme-switcher" id="themeSwitcher">
            <button
              class="theme-btn"
              id="themeBtn"
              type="button"
              aria-haspopup="true"
              aria-expanded="false"
              title="Change theme"
            >
              <span class="theme-btn-icon" id="themeBtnIcon">🌤️</span>
            </button>
            <div class="theme-menu" id="themeMenu" role="menu">
              <button class="theme-opt" data-theme="auto" role="menuitem">
                <span class="theme-opt-swatch sw-auto"></span>
                <span class="theme-opt-icon">🧭</span>
                <span class="theme-opt-label">Auto</span>
                <span class="theme-opt-sub">Matches time of day</span>
              </button>
              <div class="theme-menu-sep"></div>
              <button class="theme-opt" data-theme="morning" role="menuitem">
                <span class="theme-opt-swatch sw-morning"></span>
                <span class="theme-opt-icon">🌅</span>
                <span class="theme-opt-label">Morning</span>
              </button>
              <button class="theme-opt" data-theme="afternoon" role="menuitem">
                <span class="theme-opt-swatch sw-afternoon"></span>
                <span class="theme-opt-icon">☀️</span>
                <span class="theme-opt-label">Afternoon</span>
              </button>
              <button class="theme-opt" data-theme="evening" role="menuitem">
                <span class="theme-opt-swatch sw-evening"></span>
                <span class="theme-opt-icon">🌆</span>
                <span class="theme-opt-label">Evening</span>
              </button>
              <button class="theme-opt" data-theme="night" role="menuitem">
                <span class="theme-opt-swatch sw-night"></span>
                <span class="theme-opt-icon">🌙</span>
                <span class="theme-opt-label">Night</span>
              </button>
            </div>
          </div>
          <button class="leave-btn" id="leaveBtn">
            <svg
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <polyline points="16 17 21 12 16 7" />
              <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
            Leave
          </button>
        </div>
      </header>
      <!-- ===== ROOM DETAILS ===== -->
      <section class="room-details" id="roomDetails">
        <div style="display: flex; flex-direction: column; gap: 0.55rem">
          <div class="sk" style="width: 55%; height: 1.15rem"></div>
          <div class="sk" style="width: 90%; height: 0.85rem"></div>
          <div class="sk" style="width: 40%; height: 0.85rem"></div>
        </div>
      </section>
      <!-- ===== MAIN CONTENT ===== -->
      <div class="room-content">
        <!-- VIDEO -->
        <div class="video-section">
          <div class="video-container" id="videoContainer">
            <div id="videoWrapper">
              <div class="video-placeholder" id="videoPlaceholder">
                <div class="vp-icon">📺</div>
                <p class="vp-text">No video loaded</p>
                <p class="vp-sub">Paste a URL below to start watching</p>
              </div>
            </div>

            <!-- ===== LIVE REACTIONS FLOAT LAYER ===== -->
            <div class="fx-layer" id="fxLayer" aria-hidden="true"></div>

            <!-- custom controls (hidden until a direct video loads) -->
            <div class="vc" id="videoControls">
              <button class="vc-btn" id="playBtn" title="Play / Pause">
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="currentColor"
                >
                  <polygon points="6 3 20 12 6 21 6 3" />
                </svg>
              </button>
              <span class="vc-time" id="curTime">0:00</span>
              <input
                type="range"
                class="vc-range vc-progress"
                id="progressBar"
                min="0"
                max="1000"
                value="0"
                step="1"
              />
              <span class="vc-time" id="durTime">0:00</span>
              <div
                class="vol-wrap"
                style="display: flex; align-items: center; gap: 0.3rem"
              >
                <button class="vc-btn" id="muteBtn" title="Mute">
                  <svg
                    id="volIcon"
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                    <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
                  </svg>
                </button>
                <input
                  type="range"
                  class="vc-range vc-volume"
                  id="volBar"
                  min="0"
                  max="100"
                  value="100"
                  step="1"
                />
              </div>
              <button class="vc-btn" id="fsBtn" title="Fullscreen">
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <polyline points="15 3 21 3 21 9" />
                  <polyline points="9 21 3 21 3 15" />
                  <line x1="21" y1="3" x2="14" y2="10" />
                  <line x1="3" y1="21" x2="10" y2="14" />
                </svg>
              </button>
            </div>
          </div>
          <div class="player-bar" id="playerBar">
            <div class="url-bar">
              <input
                type="text"
                class="url-input"
                id="urlInput"
                placeholder="Paste video URL (.mp4, YouTube, etc.)"
                autocomplete="off"
              />
              <button class="btn-sm" id="loadUrlBtn">Load</button>
            </div>
            <!-- ===== REACTION RAIL ===== -->
            <div class="react-rail" id="reactRail">
              <button
                class="react-toggle"
                id="reactToggle"
                type="button"
                aria-haspopup="true"
                aria-expanded="false"
                aria-label="Send a reaction"
              >
                😀
              </button>
              <div
                class="react-strip"
                id="reactStrip"
                role="group"
                aria-label="Reactions"
              >
                <button
                  class="react-btn"
                  type="button"
                  data-emoji="❤️"
                  title="Love (1)"
                >
                  ❤️
                </button>
                <button
                  class="react-btn"
                  type="button"
                  data-emoji="😂"
                  title="Funny (2)"
                >
                  😂
                </button>
                <button
                  class="react-btn"
                  type="button"
                  data-emoji="😮"
                  title="Wow (3)"
                >
                  😮
                </button>
                <button
                  class="react-btn"
                  type="button"
                  data-emoji="😢"
                  title="Sad (4)"
                >
                  😢
                </button>
                <button
                  class="react-btn"
                  type="button"
                  data-emoji="🔥"
                  title="Fire (5)"
                >
                  🔥
                </button>
                <button
                  class="react-btn"
                  type="button"
                  data-emoji="👏"
                  title="Clap (6)"
                >
                  👏
                </button>
                <button
                  class="react-btn"
                  type="button"
                  data-emoji="💀"
                  title="Dead (7)"
                >
                  💀
                </button>
              </div>
            </div>
          </div>
        </div>
        <!-- CHAT -->
        <div class="chat-section" id="chatSection">
          <div class="chat-head">
            <span class="chat-title">💬 Chat</span>
            <span class="chat-online" id="chatOnline"></span>
          </div>
          <div class="chat-messages" id="chatMessages"></div>
          <div class="chat-bar">
            <input
              type="text"
              class="chat-input"
              id="chatInput"
              placeholder="Type a message…"
              autocomplete="off"
              maxlength="500"
            />
            <button class="send-btn" id="sendBtn" title="Send">
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="22" y1="2" x2="11" y2="13" />
                <polygon points="22 2 15 22 11 13 2 9 22 2" />
              </svg>
            </button>
          </div>
        </div>
      </div>
      <div class="toast-wrap" id="toastWrap"></div>
    </div>
    <!-- ===== SCRIPTS ===== -->
    <script src="/js/helpers/timeOfDay.js"></script>
    <script src="/js/room.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <!-- served automatically -->
  </body>
</html>
