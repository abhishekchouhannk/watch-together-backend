<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password — Watch Together</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/page.css" />
    <link rel="stylesheet" href="/css/sky.css" />
    <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>
    <main id="landing" class="sky-page">
        <img class="sky-layer" id="sky-image" draggable="false" alt="" />
        <div class="element-layer" id="element-layer"></div>
        <div class="cloud-layer" id="far-cloud-layer" data-layer="far">
            <div class="cloud-intro">
                <img class="cloud-half left" draggable="false" alt="" />
                <img class="cloud-half right" draggable="false" alt="" />
            </div>
            <div class="cloud-scroll"></div>
        </div>
        <div class="cloud-layer" id="near-cloud-layer" data-layer="near">
            <div class="cloud-intro">
                <img class="cloud-half left" draggable="false" alt="" />
                <img class="cloud-half right" draggable="false" alt="" />
            </div>
            <div class="cloud-scroll"></div>
        </div>
        <div class="page-content" id="page-content">
            <div class="auth-card">
                <h1 class="status-heading" id="heading">Reset Password</h1>
                <div class="form-message" id="form-message" hidden></div>
                <p class="status-text" id="no-token-msg" hidden>
                    Please use the password reset link sent to your email.
                </p>
                <form id="reset-form" class="auth-form" hidden>
                    <div class="field">
                        <label for="password">New Password</label>
                        <input type="password" id="password" required
                               autocomplete="new-password" placeholder="••••••••" />
                    </div>
                    <div class="field">
                        <label for="confirm-password">Confirm Password</label>
                        <input type="password" id="confirm-password" required
                               autocomplete="new-password" placeholder="••••••••" />
                    </div>
                    <button type="submit" class="submit-btn" id="submit-btn">
                        <span class="spinner" id="spinner" hidden></span>
                        <span id="submit-label">Reset Password</span>
                    </button>
                </form>
            </div>
        </div>
    </main>
    <!-- ⚠ BOTH must be modules now: sky.js imports timeOfDay.js, and module
         scripts run in order — so window.SkyBackground exists before
         reset-password.js runs. -->
    <script type="module" src="/js/sky.js"></script>
    <script type="module" src="/js/reset-password.js"></script>
</body>
</html>
